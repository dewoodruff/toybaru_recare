<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Toybaru ReCare</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;
--bg:#FFFFFF;--surface:#F5F5F5;--text:#212121;--muted:#666666;--border:#E0E0E0;--primary:#EB0A1E;--primary-hover:#C50818;--accent:#EB0A1E;--link:#EB0A1E;--shadow:rgba(0,0,0,0.06);--topbar-bg:#F5F5F5;--topbar-border:#E0E0E0;--topbar-text:#212121;--tab-active-bg:#FFFFFF;--tab-active-border:#EB0A1E;--tab-text:#666;--tab-active-text:#EB0A1E;--input-bg:#FFFFFF;--table-header:#F5F5F5;--table-hover:#FAFAFA;--error:#D32F2F;--success:#4CAF50;--green:#4CAF50;--yellow:#FFA000;--red:#D32F2F;--blue:#58a6ff;--overlay-bg:rgba(0,0,0,0.5);--log-bg:#F0F0F0}
body.dark.toyota{--bg:#121212;--surface:#1E1E1E;--text:#FFFFFF;--muted:#B0B0B0;--border:#2C2C2C;--primary:#EB0A1E;--primary-hover:#FF2233;--accent:#FF4444;--link:#FF4444;--shadow:rgba(0,0,0,0.3);--topbar-bg:#1E1E1E;--topbar-border:#2C2C2C;--topbar-text:#FFFFFF;--tab-active-bg:#2A2A2A;--tab-active-border:#EB0A1E;--tab-text:#888;--tab-active-text:#FF4444;--input-bg:#1E1E1E;--table-header:#2A2A2A;--table-hover:#252525;--error:#FF6B6B;--success:#66BB6A;--green:#66BB6A;--yellow:#FFB74D;--red:#FF6B6B;--blue:#64B5F6;--overlay-bg:rgba(0,0,0,0.6);--log-bg:#111}
body.subaru{--bg:#F0F2F5;--surface:#FFFFFF;--text:#1A1A2E;--muted:#555555;--border:#D0D5DD;--primary:#003366;--primary-hover:#002244;--accent:#003366;--link:#003366;--shadow:rgba(0,51,102,0.06);--topbar-bg:#003366;--topbar-border:#002244;--topbar-text:#FFFFFF;--tab-active-bg:#FFFFFF;--tab-active-border:#003366;--tab-text:#666;--tab-active-text:#003366;--input-bg:#FFFFFF;--table-header:#E8ECF0;--table-hover:#F5F7FA;--error:#D32F2F;--success:#4CAF50;--green:#4CAF50;--yellow:#FFA000;--red:#D32F2F;--blue:#336699;--overlay-bg:rgba(0,0,0,0.5);--log-bg:#E8ECF0}
body.dark.subaru{--bg:#0A1628;--surface:#0F2035;--text:#E5E8EB;--muted:#8899AA;--border:#1A3050;--primary:#336699;--primary-hover:#4477AA;--accent:#5599CC;--link:#5599CC;--shadow:rgba(0,0,0,0.3);--topbar-bg:#0F2035;--topbar-border:#1A3050;--topbar-text:#E5E8EB;--tab-active-bg:#152A44;--tab-active-border:#336699;--tab-text:#667788;--tab-active-text:#5599CC;--input-bg:#0F2035;--table-header:#152A44;--table-hover:#12253B;--error:#FF6B6B;--success:#66BB6A;--green:#66BB6A;--yellow:#FFB74D;--red:#FF6B6B;--blue:#5599CC;--overlay-bg:rgba(0,0,0,0.6);--log-bg:#081020}
.shell{display:flex;flex-direction:column;height:100vh}
.topbar{display:flex;align-items:center;gap:12px;padding:8px 20px;border-bottom:1px solid var(--topbar-border);flex-shrink:0;background:var(--topbar-bg);color:var(--topbar-text)}
.topbar h1{font-size:15px;font-weight:600;margin-right:auto}
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);padding:0 20px;flex-shrink:0;background:var(--bg)}
.tab{padding:8px 16px;font-size:13px;color:var(--tab-text);cursor:pointer;border-bottom:2px solid transparent;transition:color .15s}
.tab:hover{color:var(--text)}.tab.active{color:var(--tab-active-text);border-bottom-color:var(--tab-active-border)}
.page{display:none;flex:1;overflow-y:auto;padding:20px;max-width:1440px;margin:0 auto;width:100%}.page.active{display:block}
select,input[type=date],input[type=text],input[type=email],input[type=password]{background:var(--input-bg);color:var(--text);border:1px solid var(--border);padding:6px 10px;border-radius:6px;font-size:13px;width:100%}
.btn{background:var(--surface);color:var(--text);border:1px solid var(--border);padding:5px 14px;border-radius:6px;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:border-color .15s}
.btn:hover{border-color:var(--muted)}.btn:disabled{opacity:.4;cursor:default}
.btn-primary{background:var(--primary);color:#fff;border-color:var(--primary)}.btn-primary:hover{opacity:.85}
.btn-destructive{background:color-mix(in srgb,var(--red) 10%,var(--surface));color:var(--red);border-color:color-mix(in srgb,var(--red) 40%,transparent)}.btn-destructive:hover{background:color-mix(in srgb,var(--red) 18%,var(--surface))}
.btn-sm{padding:3px 8px;font-size:11px}
.meta{color:var(--muted);font-size:12px}
.row{display:flex;justify-content:space-between;padding:6px 0;font-size:13px}.row .k{color:var(--muted)}
.section-title{font-size:13px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;box-shadow:0 1px 2px rgba(0,0,0,.03),0 4px 16px var(--shadow)}
.card+.card{margin-top:16px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.grid4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:16px}
.grid2>.card,.grid3>.card,.grid4>.card{margin-top:0}
.error{color:var(--error);font-size:13px}
a{color:var(--link)}
h1,h2,h3{color:var(--text)}
.tag{font-size:11px;padding:2px 8px;border-radius:6px;border:1px solid;font-weight:500}
.tag-ok{color:var(--green);border-color:color-mix(in srgb,var(--green) 40%,transparent);background:color-mix(in srgb,var(--green) 8%,transparent)}
.tag-warn{color:var(--red);border-color:color-mix(in srgb,var(--red) 40%,transparent);background:color-mix(in srgb,var(--red) 8%,transparent)}
.bat-pct{font-size:36px;font-weight:700;line-height:1.1;font-variant-numeric:tabular-nums}
.bat-bar{width:100%;height:8px;background:var(--border);border-radius:4px;margin:8px 0 12px}
.bat-fill{height:100%;border-radius:4px;transition:width .4s}
.vehicle-hero{display:flex;align-items:center;gap:20px;padding:16px}
.vehicle-hero img{max-width:200px;max-height:140px;object-fit:contain;border-radius:12px}
.vehicle-hero-info{flex:1}
.vehicle-hero-name{font-size:20px;font-weight:700;color:var(--text)}
.vehicle-hero-detail{font-size:13px;color:var(--muted);margin-top:4px}
.cap-badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:12px;background:var(--accent);color:#fff;font-weight:500;white-space:nowrap}
.sbar{display:flex;height:6px;border-radius:3px;overflow:hidden}
.sbar-eco{background:var(--green)}.sbar-reku{background:var(--blue)}.sbar-power{background:var(--red)}
.sbar-legend{display:flex;gap:12px;font-size:11px;color:var(--muted);margin-top:4px}
.sbar-legend span::before{content:'';display:inline-block;width:8px;height:8px;border-radius:2px;margin-right:4px;vertical-align:middle}
.leg-eco::before{background:var(--green)}.leg-reku::before{background:var(--blue)}.leg-power::before{background:var(--red)}
table{width:100%;font-size:13px;border-collapse:separate;border-spacing:0}
th{text-align:left;color:var(--muted);font-weight:500;padding:8px 12px;font-size:11px;text-transform:uppercase;letter-spacing:.02em;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--table-header);z-index:2}
td{padding:10px 12px;border-bottom:1px solid var(--border);transition:background .1s}
.clickable-row{cursor:pointer}.clickable-row:hover td{background:var(--table-hover)}
.num{text-align:right;font-variant-numeric:tabular-nums}
.trips-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;max-height:calc(100vh - 200px);overflow-y:auto}
.trip-date{font-weight:500;white-space:nowrap}
.trip-score{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:6px;font-size:12px;font-weight:600}
.score-good{background:color-mix(in srgb,var(--green) 15%,var(--surface));color:var(--green)}.score-mid{background:color-mix(in srgb,var(--yellow) 15%,var(--surface));color:var(--yellow)}.score-bad{background:color-mix(in srgb,var(--red) 15%,var(--surface));color:var(--red)}
.trip-pct{font-size:12px;color:var(--muted)}.trip-pct b{color:var(--text);font-weight:500}
.sbar{height:4px;border-radius:2px}
.tip{position:relative;cursor:help;border-bottom:1px dotted var(--muted)}
.tip .tip-text{display:none;position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:12px;color:var(--text);width:240px;z-index:50;line-height:1.4;font-weight:400;white-space:normal;box-shadow:0 4px 16px rgba(0,0,0,.15)}
.tip:hover .tip-text{display:block}
.progress-bar{width:100%;height:8px;background:var(--border);border-radius:4px;overflow:hidden}
.progress-fill{height:100%;background:var(--primary);border-radius:4px;transition:width .3s}
.log-area{background:var(--log-bg);border:1px solid var(--border);border-radius:8px;font-family:'SF Mono',Menlo,monospace;font-size:11px;padding:8px 12px;max-height:300px;overflow-y:auto;white-space:pre-wrap;color:var(--muted);display:none;margin-top:8px}.log-area.open{display:block}
.stat-num{font-size:28px;font-weight:700;line-height:1.1;font-variant-numeric:tabular-nums}.stat-label{font-size:12px;color:var(--muted);margin-top:2px}.stat-box{padding:12px}
.overlay{display:none;position:fixed;inset:0;background:var(--overlay-bg);z-index:100}.overlay.open{display:flex;align-items:center;justify-content:center}
.overlay-wrap{position:relative;width:90%;max-width:900px}
.overlay-panel{background:var(--bg);border:1px solid var(--border);border-radius:14px;max-height:85vh;overflow-y:auto;padding:24px}
.overlay-close{position:absolute;top:-14px;right:-14px;width:28px;height:28px;background:var(--surface);border:1px solid var(--border);color:var(--muted);font-size:16px;line-height:26px;text-align:center;cursor:pointer;border-radius:50%;z-index:110;padding:0}
.overlay-close:hover{color:var(--text);border-color:var(--muted);background:var(--border)}
.bar-chart{display:flex;align-items:flex-end;gap:3px;height:80px;margin:8px 0}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px}
.bar-col .bar{background:var(--primary);border-radius:2px 2px 0 0;width:100%;min-height:1px;transition:height .3s}
.bar-col .bar-label{font-size:9px;color:var(--muted)}
/* Login */
.login-wrap{display:flex;align-items:center;justify-content:center;height:100vh}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:32px;width:360px;box-shadow:0 1px 2px rgba(0,0,0,.03),0 8px 32px var(--shadow)}
.login-card h1{font-size:18px;font-weight:600;margin-bottom:4px}
.login-card p{color:var(--muted);font-size:13px;margin-bottom:20px}
.login-card label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px;margin-top:12px}
.login-card .error{margin-top:12px}
.lang-select{background:var(--input-bg);color:var(--text);border:1px solid var(--border);padding:3px 6px;border-radius:6px;font-size:12px}
.sync-select{background:var(--input-bg);color:var(--text);border:1px solid var(--border);padding:3px 6px;border-radius:6px;font-size:12px}
.topbar .lang-select,.topbar .sync-select{color:var(--topbar-text)}
.theme-toggle{background:none;border:1px solid var(--border);border-radius:6px;cursor:pointer;font-size:1.1em;padding:2px 8px;color:var(--text)}
.theme-toggle:hover{border-color:var(--muted)}
/* Subaru topbar special handling */
body.subaru .topbar select,body.subaru .topbar button{color:var(--topbar-text)}
body.subaru .topbar .btn{background:rgba(255,255,255,0.15);border-color:rgba(255,255,255,0.25)}
body.subaru .topbar .btn:hover{background:rgba(255,255,255,0.25)}
body.subaru .topbar .lang-select,body.subaru .topbar .sync-select{background:rgba(255,255,255,0.15);border-color:rgba(255,255,255,0.25);color:#FFFFFF}
body.subaru .topbar .theme-toggle{border-color:rgba(255,255,255,0.25);color:#FFFFFF}
body.dark.subaru .topbar select,body.dark.subaru .topbar button{color:var(--topbar-text)}
body.dark.subaru .topbar .lang-select,body.dark.subaru .topbar .sync-select{background:var(--input-bg);border-color:var(--border);color:var(--text)}
/* Responsive */
@media(max-width:960px){
  .grid2,.grid3,.grid4{grid-template-columns:1fr}
  .topbar{flex-wrap:wrap;padding:10px 16px;gap:8px}
  .tabs{padding:0 16px;overflow-x:auto;-webkit-overflow-scrolling:touch}
  .page{padding:16px}
  .overlay-wrap{width:95%;max-width:none}
}
@media(max-width:640px){
  .vehicle-hero{flex-direction:column;align-items:flex-start;gap:12px;padding:12px}
  .vehicle-hero img{max-width:100%;max-height:160px}
  .bat-pct{font-size:28px}
  .stat-num{font-size:20px}
  iframe{height:180px!important}
  .topbar h1{font-size:14px}
}
/* Density mode */
body.dense .card{padding:12px;border-radius:10px}
body.dense .row{padding:3px 0;font-size:12px}
body.dense .section-title{font-size:11px;margin-bottom:6px}
body.dense .stat-num{font-size:20px}
body.dense .bat-pct{font-size:28px}
body.dense .grid2{gap:10px}
body.dense .page{gap:10px!important;padding:12px}
body.dense .vehicle-hero{padding:10px;gap:12px}
body.dense .vehicle-hero img{max-width:140px;max-height:100px}
body.dense .vehicle-hero-name{font-size:16px}
body.dense .btn{padding:3px 10px;font-size:12px}
body.dense .meta{font-size:11px}
</style>
</head>
<body class="toyota">

<!-- LOGIN -->
<div id="loginView" class="login-wrap" style="display:none">
  <div class="login-card">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <h1>Toybaru ReCare</h1>
      <select class="lang-select" onchange="setLang(this.value)" id="langSelect" style="width:auto"></select>
    </div>
    <p id="loginSubtitle"></p>
    <label id="loginEmailLabel"></label>
    <input type="email" id="loginEmail" autocomplete="email">
    <label id="loginPwLabel"></label>
    <input type="password" id="loginPw" autocomplete="current-password">
    <div id="otpGroup" style="display:none">
      <label id="loginOtpLabel"></label>
      <input type="text" id="loginOtp" autocomplete="one-time-code" placeholder="000000">
      <div class="meta" id="otpHint"></div>
    </div>
    <label id="loginBrandLabel"></label>
    <select id="loginBrand" onchange="updateLoginRegions()"></select>
    <label id="loginRegionLabel"></label>
    <select id="loginRegion"></select>
    <button class="btn btn-primary" style="width:100%;margin-top:16px;padding:8px" onclick="doLogin()" id="loginBtn"></button>
    <div class="error" id="loginError"></div>
  </div>
</div>

<!-- APP -->
<div id="appView" style="display:none">
<div class="shell">
<div class="topbar">
  <h1>Toybaru ReCare</h1>
  <select id="vinSelect" style="width:auto"></select>
  <span class="meta" id="lastUpdate"></span>
  <select class="lang-select" onchange="setLang(this.value)" id="langSelect" style="width:auto"></select>
  <select class="sync-select" onchange="setAutoSync(parseInt(this.value))" style="width:auto">
    <option value="0">Auto: Off</option>
    <option value="1">Auto: 1 min</option>
    <option value="5">Auto: 5 min</option>
    <option value="15">Auto: 15 min</option>
    <option value="30">Auto: 30 min</option>
    <option value="60">Auto: 60 min</option>

  <button onclick="toggleDensity()" id="densityBtn" class="theme-toggle" title="Toggle comfort/dense mode">⊞</button>

</div>
<div class="tabs" id="tabBar"></div>

<div class="page active" id="page-vehicle" style="display:flex;flex-direction:column;gap:16px">
  <div class="card" id="vehicleHeroCard" style="display:none;margin:0"></div>
  <div class="grid2">
    <div class="card" id="batteryCard" style="margin:0"></div>
    <div class="card" id="statusCard"></div>
    <div class="card" id="tireCard"></div>
    <div class="card" id="remoteCard"></div>
    <div class="card" id="efficiencyCard"></div>
  </div>
  <div class="card" id="lastTripCard" style="margin:0"></div>
  <div style="text-align:right"><button class="btn" onclick="loadOverview()" id="refreshOverviewBtn"></button></div>
</div>

<div class="page" id="page-trips">
  <div style="display:flex;gap:12px;align-items:center;margin-bottom:12px">
    <input type="date" id="tripsFrom" style="width:auto"> <span class="meta" id="tripsToLabel"></span> <input type="date" id="tripsTo" style="width:auto">
    <button class="btn btn-primary" onclick="loadTripsPage()" id="tripsLoadBtn"></button>
    <button class="btn" onclick="syncTrips()" id="syncBtn"></button>
    <span class="meta" id="tripsMeta"></span>
  </div>
  <div id="tripsTable"></div>
</div>

<div class="page" id="page-stats"><div id="statsContent"><div class="meta" id="statsLoading"></div></div></div>

<div class="page" id="page-import">
  <div class="grid2" style="align-items:start">
    <!-- Import from API -->
    <div class="card">
      <div class="section-title" id="importTitle"></div>
      <p class="meta" id="importDesc" style="margin-bottom:12px"></p>
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:12px">
        <label class="meta" id="importFromLabel"></label><input type="date" id="importFrom" value="2024-06-06" style="width:auto">
        <label class="meta" id="importToLabel"></label><input type="date" id="importTo" style="width:auto">

        <div class="progress-bar"><div class="progress-fill" id="importFill" style="width:0%"></div></div>
        <div style="display:flex;justify-content:space-between;margin-top:6px"><span class="meta" id="importStatus"></span><span class="meta" id="importPct">0%</span></div>
      </div>
      <div style="margin-top:8px">
        <button class="btn btn-sm" onclick="toggleImportLog()" id="importLogBtn"></button>

        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <a class="btn" href="/api/export/trips.csv" download>Trips CSV</a>
          <a class="btn" href="/api/export/trips.json" download>Trips JSON</a>
          <a class="btn" href="/api/export/snapshots.csv" download>Snapshots CSV</a>
        </div>
      </div>

      <div class="card">

        <p class="meta" style="margin-bottom:12px">Import a previously exported JSON file back into the database.</p>
        <input type="file" id="reimportFile" accept=".json" style="margin-bottom:8px">
        <button class="btn" onclick="reimportJson()">Import JSON</button>
        <div class="meta" id="reimportStatus" style="margin-top:8px"></div>
      </div>
    </div>
  </div>
</div>
</div>
</div>

<!-- Trip detail overlay -->
<div class="overlay" id="tripOverlay">
  <div class="overlay-wrap">
    <button class="overlay-close" onclick="closeTrip()">&times;</button>
    <div class="overlay-panel"><div id="tripDetail"></div></div>
  </div>
</div>

<script>
// --- i18n ---
let lang = localStorage.getItem('toybaru_lang') || (() => {
  const bl = navigator.language || 'en';
  if (bl.startsWith('ja')) return 'ja-JP';
  if (bl.startsWith('nl')) return 'nl-NL';
  if (bl === 'fr-CA') return 'fr-CA';
  if (bl.startsWith('fr')) return 'fr-FR';
  if (bl === 'es-MX') return 'es-MX';
  if (bl.startsWith('es')) return 'es-ES';
  if (bl.startsWith('de')) return 'de';
  if (bl === 'en-US' || bl === 'en-us') return 'en-US';
  return 'en';
})();
let i = {};
let LC = 'en-GB'; // browser locale for date/number formatting
let availableLangs = [];
const DEBUG = new URLSearchParams(window.location.search).has('debug');

async function loadI18n() {
  i = await (await fetch(`/api/locale/${lang}`)).json();
  LC = i._meta?.locale || lang;
  applyI18n();
}

function t(path) {
  return path.split('.').reduce((o, k) => o?.[k], i) || path;
}

function tip(label, descKey) {
  const span = document.createElement('span');
  span.className = 'tip';
  span.textContent = label;
  const tipText = document.createElement('span');
  tipText.className = 'tip-text';
  tipText.textContent = t(descKey);
  span.appendChild(tipText);
  return span.outerHTML;
}

function setLang(l) {
  lang = l;
  localStorage.setItem('toybaru_lang', l);
  loadI18n();
}

// --- Auto-sync ---
let _syncInterval = null;

function setAutoSync(minutes) {
  localStorage.setItem('toybaru_autosync', String(minutes));
  if (_syncInterval) { clearInterval(_syncInterval); _syncInterval = null; }
  if (minutes > 0) {

}

let _otpSession = '';

async function doLogin() {
  const btn = document.getElementById('loginBtn');
  const err = document.getElementById('loginError');
  const otpGroup = document.getElementById('otpGroup');
  btn.disabled = true; btn.textContent = t('login.signing_in'); err.textContent = '';

  // If OTP field is visible, we're in phase 2
  if (otpGroup.style.display !== 'none' && _otpSession) {
    try {
      const res = await fetch('/api/login/otp', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({otp_session: _otpSession, code: document.getElementById('loginOtp').value}),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || t('login.otp_invalid'));
      _csrfToken = data.csrf_token || '';
      document.getElementById('loginPw').value = '';
      document.getElementById('loginOtp').value = '';
      otpGroup.style.display = 'none';
      _otpSession = '';
      await checkAuth();
    } catch(e) {
      err.textContent = t('login.otp_invalid') + ': ' + e.message;
    }
    btn.disabled = false; btn.textContent = t('login.submit');
    return;
  }

  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        username: document.getElementById('loginEmail').value,
        password: document.getElementById('loginPw').value,
        region: document.getElementById('loginRegion').value,
      }),
    });
    const data = await res.json();
    if (data.needs_otp) {
      _otpSession = data.otp_session;
      otpGroup.style.display = 'block';
      document.getElementById('loginOtpLabel').textContent = t('login.otp_label');
      document.getElementById('otpHint').textContent = t('login.otp_sent');
      document.getElementById('loginOtp').focus();
      btn.disabled = false; btn.textContent = t('login.submit');
      return;
    }
    if (res.status === 429) throw new Error(t('login.rate_limited'));
    if (!res.ok) throw new Error(data.error || t('login.failed'));
    _csrfToken = data.csrf_token || '';
    document.getElementById('loginPw').value = '';
    await checkAuth();
  } catch(e) {
    err.textContent = t('login.failed') + ': ' + e.message;
  }
  btn.disabled = false; btn.textContent = t('login.submit');
}

  _csrfToken = '';
  location.reload();
}

// --- Overview ---
async function loadOverview() {
  if (!currentVin) return;
  document.getElementById('lastUpdate').textContent = t('app.loading');
  allData = await (await fetch(`/api/all/${currentVin}`)).json();
  // Detect unit from battery data
  if (allData.battery?.evRange?.unit) {
    UNIT = normUnit(allData.battery.evRange.unit);
  }
  // Detect capabilities
  const prevHasTrips = HAS_TRIPS;
  if (allData.capabilities) {
    HAS_TRIPS = allData.capabilities.trips !== false;
    // Use US locale for date/time formatting for NA users
    if (allData.capabilities.trips === false) LC = 'en-US';
  }
  if (HAS_TRIPS !== prevHasTrips) applyI18n();
  // Detect brand from API response
  if (allData.brand) {
    applyBrand(allData.brand);
  }
  renderVehicleHero(allData.vehicle, allData.battery?.solar, allData.battery, allData.status);
  renderBattery(allData.battery, allData);
  renderStatus(allData.status, allData.telemetry, allData.location);
  renderTirePressure(allData.telemetry, allData.status);
  renderEfficiency(allData);
  renderRemote(allData.vehicle?.remote_capabilities, allData.climate_settings);
  renderLastTrip();
  document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString(LC);
}

  html+=`<div style="background:color-mix(in srgb,var(--border) 20%,var(--bg));border-radius:8px;padding:10px;grid-column:1/-1"><div style="font-size:14px;font-weight:600">${_escHtml(csMap[cs]||cs)}</div><div class="stat-label">${t('battery.status')}</div></div>`;
  html+=`</div></div>`;
  if(cs==='charging'&&d.remainingChargeTime){
    const kw=((100-(pctOk?pct:0))/100*71.4/(d.remainingChargeTime/60));
    const lvl=kw>=20?'DC Fast (L3)':kw>=2?'Level 2':'Level 1';
    const lvlColor=kw>=20?'var(--green)':kw>=2?'var(--accent)':'var(--yellow)';
    const ct=d.chargeType!=null?` (type ${d.chargeType})`:'';
    html+=`<div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border)">`;
    html+=`<div class="row"><span class="k">${t('battery.full_in')}</span><span>${Math.floor(d.remainingChargeTime/60)}h ${d.remainingChargeTime%60}min</span></div>`;
    html+=`<div class="row"><span class="k">${t('battery.full_at')}</span><span>${new Date(Date.now()+d.remainingChargeTime*60000).toLocaleTimeString(LC,{hour:'2-digit',minute:'2-digit'})}</span></div>`;
    html+=`<div class="row"><span class="k">${t('battery.charge_rate')}</span><span>${kw.toFixed(1)} kW</span></div>`;
    html+=`<div class="row"><span class="k">${t('battery.charger')}</span><span style="color:${lvlColor};font-weight:600">${_escHtml(lvl)}${ct}</span></div>`;
    html+=`</div>`;
  }
  if(d.lastUpdateTimestamp)html+=`<div class="row" style="margin-top:8px"><span class="k">${t('battery.last_update')}</span><span class="meta">${fmtDate(d.lastUpdateTimestamp)}</span></div>`;

  // Charge cycle stats
  const cycles=d.plugInHistory;
  const firstUse=allCtx?.vehicle?.first_use_date;
  if(cycles!=null){
    let cyclesPerMonth='';
    if(firstUse){
      const days=(Date.now()-new Date(firstUse+'T00:00:00').getTime())/86400000;
      if(days>0)cyclesPerMonth=` (~${(cycles/days*30.44).toFixed(1)}/month)`;
    }
    html+=`<div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border)">`;
    html+=`<div class="row"><span class="k">${t('battery.lifetime_sessions')}</span><span>${cycles}${cyclesPerMonth}</span></div>`;
    html+=`<div class="row"><span class="k">${t('battery.est_throughput')}</span><span>~${(cycles*0.5*71.4).toFixed(0)} kWh</span></div>`;
    html+=`<div class="meta" style="margin-top:4px">${t('battery.lifetime_note').replace('{cycles}',cycles)}</div>`;
    html+=`</div>`;
  }

  // History chart placeholder
  html+=`<div id="batHistoryArea" style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border)"><div class="meta">${t('battery.history_loading')}</div></div>`;
  el.innerHTML=html;

  // Show last update time next to refresh button
  if(d.lastUpdateTimestamp){
    const st=document.getElementById('batRefreshStatus');
    if(st) st.textContent=`Updated ${new Date(d.lastUpdateTimestamp).toLocaleTimeString(LC,{hour:'2-digit',minute:'2-digit'})}`;
  }

  // Load history chart async
  _loadBatteryHistoryChart();
}

async function _loadBatteryHistoryChart() {
  const el=document.getElementById('batHistoryArea');
  if(!el)return;
  try {
    const data = await (await fetch('/api/battery-history')).json();
    if (!data.length) { el.innerHTML = `<div class="meta">${t('battery.history_empty')}</div>`; return; }
    const W = 700, H = 200, pad = {t:20, r:20, b:40, l:50};
    const pw = W - pad.l - pad.r, ph = H - pad.t - pad.b;
    const times = data.map(d => new Date(d.timestamp).getTime());
    const tMin = Math.min(...times), tMax = Math.max(...times);
    const tSpan = tMax - tMin || 1;
    const xf = t => pad.l + ((t - tMin) / tSpan) * pw;
    const yf = v => pad.t + (1 - v / 100) * ph;

    let socPath = '';
    data.forEach((d, i) => { const px=xf(times[i]),py=yf(d.soc); socPath+=(i===0?'M':'L')+px.toFixed(1)+','+py.toFixed(1); });

    const ranges = data.filter(d => d.range_km != null);
    let rangePath = '', maxRange = 0;
    if (ranges.length > 1) {
      maxRange = Math.max(...ranges.map(d => d.range_km));
      ranges.forEach((d, i) => {
        const px = xf(new Date(d.timestamp).getTime());
        const py = pad.t + (1 - d.range_km / maxRange) * ph;
        rangePath += (i === 0 ? 'M' : 'L') + px.toFixed(1) + ',' + py.toFixed(1);
      });
    }

    let grid = '';
    for (const pct of [0, 25, 50, 75, 100]) {
      const gy = yf(pct);
      grid += `<line x1="${pad.l}" y1="${gy}" x2="${W-pad.r}" y2="${gy}" stroke="var(--border)" stroke-dasharray="3,3"/>`;
      grid += `<text x="${pad.l-6}" y="${gy+4}" text-anchor="end" font-size="10" fill="var(--muted)">${pct}%</text>`;
    }
    const labelCount = Math.min(5, data.length);
    let timeLabels = '';
    for (let i = 0; i < labelCount; i++) {
      const idx = Math.floor(i * (data.length - 1) / (labelCount - 1));
      const tx = xf(times[idx]);
      const dt = new Date(times[idx]);
      timeLabels += `<text x="${tx}" y="${H-5}" text-anchor="middle" font-size="10" fill="var(--muted)">${dt.toLocaleDateString(LC,{month:'short',day:'numeric'})}</text>`;
    }
    let chargeDots = '';
    data.forEach((d, i) => {
      if (d.charging_status === 'charging') chargeDots += `<circle cx="${xf(times[i])}" cy="${yf(d.soc)}" r="3" fill="var(--green)" opacity="0.6"/>`;
    });

    const svgHtml = `<svg viewBox="0 0 ${W} ${H}" style="width:100%;max-height:230px">
      ${grid}${timeLabels}
      <path d="${socPath}" fill="none" stroke="var(--accent)" stroke-width="2"/>
      ${rangePath ? `<path d="${rangePath}" fill="none" stroke="var(--blue)" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.7"/>` : ''}
      ${chargeDots}
    </svg>`;
    const legend = `<div style="display:flex;gap:16px;font-size:11px;color:var(--muted);margin-top:4px;flex-wrap:wrap">
      <span><span style="display:inline-block;width:12px;height:3px;background:var(--accent);vertical-align:middle;margin-right:4px"></span>SOC %</span>
      ${rangePath ? `<span><span style="display:inline-block;width:12px;height:3px;background:var(--blue);vertical-align:middle;margin-right:4px;border-top:1px dashed var(--blue)"></span>Range (max ${Math.round(maxRange)} mi)</span>` : ''}
      <span><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--green);vertical-align:middle;margin-right:4px;opacity:0.6"></span>Charging</span>
      <span style="margin-left:auto">${data.length} snapshots</span>
    </div>`;

    el.innerHTML = `<div style="font-size:12px;font-weight:600;color:var(--muted);margin-bottom:6px">${t('battery.history')}</div>${svgHtml}${legend}`;
  } catch (e) {
    el.innerHTML = `<div class="meta">${t('battery.history_error')}: ${_escHtml(e.message)}</div>`;
  }
}

async function refreshBattery() {
  if(!currentVin)return;
  const btn=document.getElementById('batRefreshBtn');const st=document.getElementById('batRefreshStatus');
  btn.disabled=true;btn.style.opacity='.6';btn.textContent='...';
  try{
    const resp = await fetch(`/api/refresh/${currentVin}`,{method:'POST',headers:_postHeaders()});
    if (resp.status === 429) {
      const msg = await resp.json().catch(() => ({detail:'Rate limited'}));
      st.textContent = '⚠️ ' + (msg.detail || 'Rate limited');
      btn.disabled=false;btn.textContent=t('battery.refresh_btn');btn.style.opacity='1';
      return;
    }
    st.textContent='⏳ Waking vehicle...';

    const originalPct = allData?.battery?.batteryLevel;
    const originalTs = allData?.battery?.lastUpdateTimestamp;
    let attempts = 0;
    const maxAttempts = 8;
    const interval = 10000;

    function showStatus(msg) {
      const el = document.getElementById('batRefreshStatus');
      if (el) el.textContent = msg;
    }
    function resetBtn() {
      const b = document.getElementById('batRefreshBtn');
      if (b) { b.disabled=false; b.textContent=t('battery.refresh_btn'); b.style.opacity='1'; }
    }
    function fmtTs(ts) {
      if (!ts) return '';
      return new Date(ts).toLocaleTimeString(LC, {hour:'2-digit',minute:'2-digit'});
    }

    const poll = async () => {
      attempts++;
      showStatus(`⏳ Waiting (${attempts}/${maxAttempts})...`);
      const b = document.getElementById('batRefreshBtn');
      if (b) b.textContent = `${attempts}/${maxAttempts}`;
      try {
        const c = await (await fetch(`/api/battery/${currentVin}`)).json();
        if (c && !c.error) {
          const newTs = c.lastUpdateTimestamp;
          const newPct = c.batteryLevel;
          if ((newTs && newTs !== originalTs) || (newPct != null && newPct !== originalPct)) {
            allData.battery = c;
            renderBattery(c, allData);
            renderVehicleHero(allData.vehicle, c.solar, c, allData.status);
            showStatus(`✅ ${newPct}% · Updated ${fmtTs(newTs)}`);
            resetBtn();
            return;
          }
        }
      } catch(e) { /* keep trying */ }

      if (attempts < maxAttempts) {
        setTimeout(poll, interval);
      } else {
        showStatus('⏳ Final refresh...');
        await loadOverview();
        const finalPct = allData?.battery?.batteryLevel;
        const finalTs = allData?.battery?.lastUpdateTimestamp;
        if (finalPct != null && finalPct !== originalPct) {
          showStatus(`✅ ${finalPct}% · Updated ${fmtTs(finalTs)}`);
        } else {
          showStatus(`⚠️ No change yet · Last: ${fmtTs(finalTs || originalTs)}`);
        }
        resetBtn();
      }
    };
    setTimeout(poll, interval);
  }catch(e){
    const el=document.getElementById('batRefreshStatus');
    if(el) el.textContent=t('app.error')+': '+e.message;
    const b=document.getElementById('batRefreshBtn');
    if(b){b.disabled=false;b.textContent=t('battery.refresh_btn');b.style.opacity='1'}
  }
}

    h+=`<div class="stat-num" style="font-size:20px">${isFinite(svcVal)?svcVal.toLocaleString(LC):_escHtml(svc.value)}</div>`;
    h+=`<div class="stat-label">${t('status.next_service')} (${_escHtml(normUnit(svc.unit)||distLabel())})</div></div>`;
  }
  h+=`</div>`;

  // Remaining status rows (skip categories handled by Vehicle Status card)
  const skipCats=new Set(['Driver Side','Passenger Side','Other']);

    if(skipCats.has(cat.category))continue;
    hasRows=true;
    h+=`<div style="font-size:11px;color:var(--muted);margin-top:6px">${_escHtml(ts(cat.category))}</div>`;
    for(const sec of cat.sections||[]){
      h+=`<div class="row"><span class="k">${_escHtml(ts(sec.section))}</span><span>`;
      for(const v of (sec.values||[])){const bad=/open|unlocked/i.test(v.value);h+=`<span class="tag ${bad?'tag-warn':'tag-ok'}">${_escHtml(ts(v.value))}</span> `}
      h+=`</span></div>`;
    }
  }
  if(d.occurrenceDate)h+=`<div class="row" style="margin-top:8px"><span class="k">${t('status.last_update')}</span><span class="meta">${fmtDate(d.occurrenceDate)}</span></div>`;

  // Location map
  const loc=locData&&!locData.error?(locData.vehicleLocation||locData):null;
  const lat=loc?.latitude,lon=loc?.longitude;
  const locTs=loc?.locationAcquisitionDatetime||locData?.lastTimestamp;
  if(lat&&lon){
    h+=`<div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border)">`;
    h+=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><span style="font-size:12px;font-weight:600;color:var(--muted)">${t('location.title')}</span>`;
    if(locTs){
      const ago=Math.round((Date.now()-new Date(locTs).getTime())/60000);
      const agoLabel=ago<1?'just now':ago<60?ago+'m ago':Math.round(ago/60)+'h ago';
      const stale=ago>60;
      h+=`<span style="font-size:11px;font-weight:500;padding:2px 8px;border-radius:8px;background:${stale?'color-mix(in srgb,var(--yellow) 12%,var(--bg))':'color-mix(in srgb,var(--green) 10%,var(--bg))'};color:${stale?'var(--yellow)':'var(--green)'}">⏱ ${agoLabel}</span>`;
    }
    h+=`</div>`;
    h+=`<iframe sandbox="allow-scripts allow-same-origin" style="width:100%;height:200px;border-radius:10px;border:1px solid var(--border);margin-bottom:6px" loading="lazy" src="https://www.openstreetmap.org/export/embed.html?bbox=${lon-.004},${lat-.002},${lon+.004},${lat+.002}&layer=mapnik&marker=${lat},${lon}"></iframe>`;
    h+=`<div class="meta" style="text-align:center">${lat.toFixed(5)}, ${lon.toFixed(5)}</div>`;
    h+=`</div>`;
  }

  if(!hasRows&&!odo&&!svc&&cnt===0&&!lat)h+=`<div class="meta">${t('status.no_additional')}</div>`;
  el.innerHTML=h;
}

function renderTirePressure(tel, status) {
  const el=document.getElementById('tireCard');
  if(!tel||tel.error){el.style.display='none';return}
  const fl=tel.flTirePressure, fr=tel.frTirePressure, rl=tel.rlTirePressure, rr=tel.rrTirePressure;
  if(!fl&&!fr&&!rl&&!rr){el.style.display='none';return}
  el.style.display='';

  function tireColor(tire){
    if(!tire)return'var(--muted)';
    if(tire.displayLowTirePressureWarning)return'var(--yellow)';
    const v=tire.value;if(v<30||v>50)return'var(--yellow)';return'var(--green)';
  }
  function psiVal(tire){return tire?tire.value+'':'--'}
  function winColor(v){return v===2?'var(--green)':v===1?'var(--yellow)':'var(--muted)'}
  function winLabel(v){return v===2?'Closed':v===1?'Open':'—'}

  // Parse door/hatch/hood from vehicleStatus
  const doorInfo={};
  if(status&&status.vehicleStatus){
    for(const cat of status.vehicleStatus){
      for(const sec of (cat.sections||[])){
        const key=`${cat.category} ${sec.section}`;
        const vals=(sec.values||[]).map(v=>v.value);
        doorInfo[key]={
          closed:vals.some(v=>/closed/i.test(v)),
          open:vals.some(v=>/open/i.test(v)),
          locked:vals.some(v=>/locked/i.test(v)&&!/unlocked/i.test(v)),
          unlocked:vals.some(v=>/unlocked/i.test(v)),
        };
      }
    }
  }
  function doorColor(key){const d=doorInfo[key];if(!d)return'var(--muted)';if(d.open||d.unlocked)return'var(--yellow)';return'var(--green)'}

  // Mini car outline (reusable) — simple rounded rect
  const carBody=`<rect x="12" y="8" width="56" height="84" rx="12" fill="var(--surface)" stroke="var(--border)" stroke-width="1.5"/>`;

  let h=`<div class="section-title">${t('vehicle_status.title')}</div>`;

  // Summary strip
  const tireOk=[fl,fr,rl,rr].filter(t=>t&&!t.displayLowTirePressureWarning&&t.value>=30&&t.value<=50).length;
  const tireTotal=[fl,fr,rl,rr].filter(Boolean).length;
  const doorsOpen=Object.entries(doorInfo).filter(([k,v])=>/Door/i.test(k)&&(v.open||v.unlocked)).length;
  const winsOpen=[tel.driverWindow,tel.passengerWindow,tel.rlWindow,tel.rrWindow].filter(v=>v===1).length;
  const summaryParts=[];
  if(tireTotal)summaryParts.push(`<span style="color:${tireOk===tireTotal?'var(--green)':'var(--yellow)'}">${tireOk}/${tireTotal} ${t('vehicle_status.tires_ok')}</span>`);
  summaryParts.push(`<span style="color:${doorsOpen?'var(--yellow)':'var(--green)'}">${doorsOpen} ${t('vehicle_status.doors_open')}</span>`);
  summaryParts.push(`<span style="color:${winsOpen?'var(--yellow)':'var(--green)'}">${winsOpen} ${t('vehicle_status.windows_open')}</span>`);
  h+=`<div style="display:flex;gap:12px;flex-wrap:wrap;font-size:12px;font-weight:500;margin-bottom:12px;padding:8px 12px;background:color-mix(in srgb,var(--border) 30%,var(--bg));border-radius:8px">${summaryParts.join(' <span style="color:var(--border)">·</span> ')}</div>`;

  h+=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:8px 0">`;

  // --- Tires section ---
  h+=`<div>`;
  h+=`<div style="font-size:12px;font-weight:600;margin-bottom:6px">🛞 Tires</div>`;
  h+=`<div style="position:relative;width:80px;height:100px;margin:0 auto 8px">`;
  h+=`<svg viewBox="0 0 80 100" width="80" height="100">${carBody}`;
  // Tire rectangles
  const tData=[{t:fl,x:2,y:16},{t:fr,x:60,y:16},{t:rl,x:2,y:64},{t:rr,x:60,y:64}];
  for(const td of tData) h+=`<rect x="${td.x}" y="${td.y}" width="10" height="20" rx="3" fill="${tireColor(td.t)}" opacity="0.8"/>`;
  h+=`</svg>`;
  // PSI labels
  const pLbl=[{t:fl,x:-4,y:36},{t:fr,x:58,y:36},{t:rl,x:-4,y:84},{t:rr,x:58,y:84}];
  for(const p of pLbl) h+=`<div style="position:absolute;left:${p.x}px;top:${p.y}px;width:24px;text-align:center;font-size:10px;font-weight:700;color:${tireColor(p.t)}">${psiVal(p.t)}</div>`;
  h+=`</div>`;
  h+=`<div style="text-align:center;font-size:10px;color:var(--muted)">${fl?.unit||'psi'}</div>`;
  if(tel.tirePressureTimestamp) h+=`<div class="row" style="font-size:11px;margin-top:4px"><span class="k">Updated</span><span>${fmtDate(tel.tirePressureTimestamp)}</span></div>`;
  h+=`</div>`;

  // --- Doors section ---
  const hasDoors=Object.keys(doorInfo).some(k=>/Door/i.test(k));
  h+=`<div>`;
  h+=`<div style="font-size:12px;font-weight:600;margin-bottom:6px">🚪 Doors</div>`;
  if(hasDoors){
    h+=`<div style="width:80px;height:100px;margin:0 auto 8px">`;
    h+=`<svg viewBox="0 0 80 100" width="80" height="100">${carBody}`;
    // Door lines on body edges
    const dLines=[
      {key:'Driver Side Door',x:12,y1:18,y2:48},
      {key:'Passenger Side Door',x:68,y1:18,y2:48},
      {key:'Driver Side Rear Door',x:12,y1:52,y2:78},
      {key:'Passenger Side Rear Door',x:68,y1:52,y2:78},

    for(const dl of dLines){

      h+=`<line x1="${dl.x}" y1="${dl.y1}" x2="${dl.x}" y2="${dl.y2}" stroke="${c}" stroke-width="3" stroke-linecap="round"/>`;
    }
    h+=`</svg></div>`;
    const doorRows=[
      {label:'Driver Front',key:'Driver Side Door'},

      {label:'Driver Rear',key:'Driver Side Rear Door'},
      {label:'Pass. Rear',key:'Passenger Side Rear Door'},

    for(const dr of doorRows){
      const d=doorInfo[dr.key];if(!d)continue;

      if(d.open)tags+=`<span class="tag tag-warn">Open</span> `;
      else if(d.closed)tags+=`<span class="tag tag-ok">Closed</span> `;
      if(d.locked)tags+=`<span class="tag tag-ok">🔒</span>`;
      else if(d.unlocked)tags+=`<span class="tag tag-warn">🔓</span>`;
      h+=`<div class="row" style="font-size:11px"><span class="k">${dr.label}</span><span>${tags}</span></div>`;
    }
  } else {
    h+=`<div class="meta">${t('vehicle_status.no_door_data')}</div>`;
  }
  h+=`</div>`;

  // --- Windows section ---
  const dw=tel.driverWindow, pw=tel.passengerWindow, rdw=tel.rlWindow, rpw=tel.rrWindow, sr=tel.sunRoof;
  const hasWindows=(dw!=null||pw!=null||rdw!=null||rpw!=null);
  h+=`<div>`;
  h+=`<div style="font-size:12px;font-weight:600;margin-bottom:6px">🪟 Windows</div>`;
  if(hasWindows){
    h+=`<div style="width:80px;height:100px;margin:0 auto 8px">`;
    h+=`<svg viewBox="0 0 80 100" width="80" height="100">${carBody}`;
    // Window fills inside car body
    h+=`<rect x="16" y="14" width="22" height="30" rx="4" fill="${winColor(dw)}" opacity="0.25"/>`;
    h+=`<rect x="42" y="14" width="22" height="30" rx="4" fill="${winColor(pw)}" opacity="0.25"/>`;
    h+=`<rect x="16" y="56" width="22" height="24" rx="4" fill="${winColor(rdw)}" opacity="0.25"/>`;
    h+=`<rect x="42" y="56" width="22" height="24" rx="4" fill="${winColor(rpw)}" opacity="0.25"/>`;
    if(sr===1||sr===2) h+=`<rect x="28" y="46" width="24" height="8" rx="3" fill="${winColor(sr)}" opacity="0.25" stroke="${winColor(sr)}" stroke-width="0.5"/>`;
    h+=`</svg></div>`;
    const wins=[{label:'Driver Front',v:dw},{label:'Pass. Front',v:pw},{label:'Driver Rear',v:rdw},{label:'Pass. Rear',v:rpw}];
    if(sr===1||sr===2)wins.push({label:'Sunroof',v:sr});
    for(const w of wins){
      const cls=w.v===2?'tag-ok':w.v===1?'tag-warn':'';
      h+=`<div class="row" style="font-size:11px"><span class="k">${w.label}</span><span class="tag ${cls}">${winLabel(w.v)}</span></div>`;
    }
  } else {
    h+=`<div class="meta">${t('vehicle_status.no_window_data')}</div>`;
  }
  h+=`</div>`;

  // --- Hood & Hatch section ---
  const hoodInfo=doorInfo['Other Hood'];
  const hatchKey=doorInfo['Other Hatch']?'Other Hatch':doorInfo['Other Trunk']?'Other Trunk':null;
  const hatchInfo=hatchKey?doorInfo[hatchKey]:null;
  h+=`<div>`;
  h+=`<div style="font-size:12px;font-weight:600;margin-bottom:6px">🏗️ Hood & Hatch</div>`;
  if(hoodInfo||hatchInfo){
    h+=`<div style="width:80px;height:100px;margin:0 auto 8px">`;
    h+=`<svg viewBox="0 0 80 100" width="80" height="100">${carBody}`;
    // Hood highlight at top
    if(hoodInfo){
      const hc=hoodInfo.open?'var(--yellow)':'var(--green)';
      h+=`<line x1="22" y1="10" x2="58" y2="10" stroke="${hc}" stroke-width="3" stroke-linecap="round"/>`;
      h+=`<text x="40" y="28" text-anchor="middle" font-size="8" fill="${hc}" font-weight="bold">HOOD</text>`;
    }
    // Hatch highlight at bottom
    if(hatchInfo){
      const hc=hatchInfo.open||hatchInfo.unlocked?'var(--yellow)':'var(--green)';
      h+=`<line x1="22" y1="90" x2="58" y2="90" stroke="${hc}" stroke-width="3" stroke-linecap="round"/>`;
      h+=`<text x="40" y="80" text-anchor="middle" font-size="8" fill="${hc}" font-weight="bold">HATCH</text>`;
    }
    h+=`</svg></div>`;
    if(hoodInfo){
      let tags='';
      if(hoodInfo.open)tags=`<span class="tag tag-warn">Open</span>`;
      else if(hoodInfo.closed)tags=`<span class="tag tag-ok">Closed</span>`;
      h+=`<div class="row" style="font-size:11px"><span class="k">Hood</span><span>${tags}</span></div>`;
    }
    if(hatchInfo){
      let tags='';
      if(hatchInfo.open)tags+=`<span class="tag tag-warn">Open</span> `;
      else if(hatchInfo.closed)tags+=`<span class="tag tag-ok">Closed</span> `;
      if(hatchInfo.locked)tags+=`<span class="tag tag-ok">🔒</span>`;
      else if(hatchInfo.unlocked)tags+=`<span class="tag tag-warn">🔓</span>`;
      h+=`<div class="row" style="font-size:11px"><span class="k">${hatchKey==='Other Trunk'?'Trunk':'Hatch'}</span><span>${tags}</span></div>`;
    }
  } else {
    h+=`<div class="meta">${t('vehicle_status.no_data')}</div>`;
  }
  h+=`</div>`;

  h+=`</div>`; // close grid

  el.innerHTML=h;
}

function renderRemote(remoteCaps, climateSettings) {
  const el=document.getElementById('remoteCard');
  let h=`<div class="section-title">${t('remote.title')}</div>`;
  const rc = remoteCaps || {};
  const cs = climateSettings && !climateSettings.error ? climateSettings : null;

  // Map commands to their remote capability flag
  const capMap = {
    'door-lock': rc.dlockUnlockCapable,
    'door-unlock': rc.dlockUnlockCapable,
    'trunk-lock': rc.trunkCapable || rc.trunkCommandCapable,
    'trunk-unlock': rc.trunkCapable || rc.trunkCommandCapable,
    'headlight-on': rc.headLightCapable || rc.headlightCommandCapable,
    'headlight-off': rc.headLightCapable || rc.headlightCommandCapable,
    'hazard-on': rc.hazardCapable,
    'hazard-off': rc.hazardCapable,
    'sound-horn': rc.hornCommandCapable,
    'buzzer-warning': rc.hornCommandCapable,
    'engine-start': rc.estartEnabled,
    'engine-stop': rc.estopEnabled,
    'find-vehicle': rc.vehicleFinderCapable,
  };

  function cmdBtn(b, variant) {
    const supported = capMap[b.cmd];
    const disabled = supported === false;
    const disAttr = disabled ? 'disabled' : '';
    const tip = disabled ? b.tip + ' (not supported)' : b.tip;
    let cls='btn btn-sm';
    if(variant==='destructive')cls+=' btn-destructive';
    else if(variant==='primary')cls+=' btn-primary';
    const extraStyle = disabled ? 'opacity:0.35;cursor:not-allowed;' : '';
    return `<button class="${cls}" data-cmd="${_escAttr(b.cmd)}" title="${_escAttr(tip)}" ${disAttr} style="${extraStyle}">${b.icon} ${_escAttr(b.label)}</button>`;
  }

  // Primary actions — most common day-to-day
  h+=`<div style="margin-bottom:14px">`;
  h+=`<div class="meta" style="margin-bottom:6px;font-weight:600">${t('remote.group_doors')}</div>`;
  h+=`<div style="display:flex;gap:6px;flex-wrap:wrap">`;
  h+=cmdBtn({cmd:'door-lock', icon:'&#128274;', label:t('remote.lock'), tip:t('remote.lock_desc')}, 'primary');
  h+=cmdBtn({cmd:'door-unlock', icon:'&#128275;', label:t('remote.unlock'), tip:t('remote.unlock_desc')});
  h+=`</div></div>`;

  h+=`<div style="margin-bottom:14px">`;
  h+=`<div class="meta" style="margin-bottom:6px;font-weight:600">${t('remote.group_hatch')}</div>`;
  h+=`<div style="display:flex;gap:6px;flex-wrap:wrap">`;
  h+=cmdBtn({cmd:'trunk-lock', icon:'&#128274;', label:t('remote.hatch_lock'), tip:t('remote.hatch_lock')});
  h+=cmdBtn({cmd:'trunk-unlock', icon:'&#128275;', label:t('remote.hatch_unlock'), tip:t('remote.hatch_unlock')});
  h+=`</div></div>`;

  // Secondary — lights, find, engine
  h+=`<div style="margin-bottom:14px;padding-top:10px;border-top:1px solid var(--border)">`;
  h+=`<div class="meta" style="margin-bottom:6px;font-weight:600">${t('remote.group_lights')} / ${t('remote.group_find')}</div>`;
  h+=`<div style="display:flex;gap:6px;flex-wrap:wrap">`;
  h+=cmdBtn({cmd:'headlight-on', icon:'&#128161;', label:t('remote.headlight_on'), tip:t('remote.headlight_on')});
  h+=cmdBtn({cmd:'headlight-off', icon:'&#128262;', label:t('remote.headlight_off'), tip:t('remote.headlight_off')});
  h+=cmdBtn({cmd:'find-vehicle', icon:'&#128269;', label:t('remote.find_vehicle'), tip:t('remote.find_vehicle')});
  h+=`</div></div>`;

  h+=`<div style="margin-bottom:14px">`;
  h+=`<div class="meta" style="margin-bottom:6px;font-weight:600">${t('remote.group_engine')}</div>`;
  h+=`<div style="display:flex;gap:6px;flex-wrap:wrap">`;
  h+=cmdBtn({cmd:'engine-start', icon:'&#9654;', label:t('remote.engine_start'), tip:t('remote.engine_start')});
  h+=cmdBtn({cmd:'engine-stop', icon:'&#9632;', label:t('remote.engine_stop'), tip:t('remote.engine_stop')});
  h+=`</div></div>`;

  // Destructive — hazards, horn (attention-getting, use with caution)
  h+=`<div style="margin-bottom:8px;padding-top:10px;border-top:1px solid var(--border)">`;
  h+=`<div class="meta" style="margin-bottom:6px;font-weight:600;color:var(--yellow)">⚠ ${t('remote.group_horn')} / ${t('remote.alerts')}</div>`;
  h+=`<div style="display:flex;gap:6px;flex-wrap:wrap">`;
  h+=cmdBtn({cmd:'hazard-on', icon:'&#9888;', label:t('remote.hazard_on'), tip:t('remote.hazard_on')}, 'destructive');
  h+=cmdBtn({cmd:'hazard-off', icon:'&#10060;', label:t('remote.hazard_off'), tip:t('remote.hazard_off')});
  h+=cmdBtn({cmd:'sound-horn', icon:'&#128227;', label:t('remote.horn'), tip:t('remote.horn')}, 'destructive');
  h+=cmdBtn({cmd:'buzzer-warning', icon:'&#128276;', label:t('remote.buzzer'), tip:t('remote.buzzer')});
  h+=`</div></div>`;

  // Climate settings from /v1/global/remote/climate-settings
  if (cs) {
    const unit = cs.temperatureUnit || 'F';
    const temp = cs.temperature;
    const minT = cs.minTemp || 58;
    const maxT = cs.maxTemp || 90;
    const interval = cs.tempInterval || 1;
    h+=`<div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border)">
      <div class="meta" style="margin-bottom:6px;font-weight:600">${t('remote.climate_title')}</div>
      <div class="row"><span class="k">${t('remote.temperature')}</span><span style="font-weight:600">${temp != null ? temp + '\u00B0' + unit : '?'}</span></div>
      <div class="row"><span class="k">${t('battery.range')}</span><span>${minT}\u00B0 \u2013 ${maxT}\u00B0${unit} (${interval}\u00B0 intervals)</span></div>
      <div class="meta" style="margin-top:4px;color:var(--yellow)">${t('remote.remote_temp_note')}</div>`;
    // Show available operations
    const ops = cs.acOperations || [];
    const availOps = ops.filter(o => o.available);
    const unavailOps = ops.filter(o => !o.available);
    if (availOps.length) {
      h+=`<div style="margin-top:8px">`;
      for (const op of availOps) {
        h+=`<div class="row"><span class="k">${_escHtml(op.categoryDisplayName)}</span><span style="color:var(--green)">${t('remote.available')}</span></div>`;
        for (const p of (op.acParameters || []).filter(p => p.available)) {
          h+=`<div class="row" style="padding-left:12px"><span class="k">${_escHtml(p.displayName || p.name)}</span><span>${p.enabled ? t('remote.on') : t('remote.off')}</span></div>`;
        }
      }
      h+=`</div>`;
    }
    if (unavailOps.length) {
      h+=`<div style="margin-top:6px"><div class="meta">${t('remote.not_available')}: ${_escHtml(unavailOps.map(o => o.categoryDisplayName).join(', '))}</div></div>`;
    }
    h+=`</div>`;
  } else {
    // Fallback to basic HVAC from battery data
    const hvac = allData?.battery?.hvac;
    if (hvac) {
      h+=`<div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border)">
        <div class="meta" style="margin-bottom:6px;font-weight:600">${t('remote.climate_title')}</div>
        <div class="row"><span class="k">${t('remote.set_temperature')}</span><span>${hvac.settingTemperature != null ? hvac.settingTemperature + '\u00B0F' : '?'}</span></div>
        <div class="row"><span class="k">${t('remote.blower')}</span><span>${hvac.blowerOn ? t('remote.on') : t('remote.off')}</span></div>
        <div class="row"><span class="k">${t('remote.front_defogger')}</span><span>${hvac.frontDefogger ? t('remote.on') : t('remote.off')}</span></div>
        <div class="row"><span class="k">${t('remote.rear_defogger')}</span><span>${hvac.rearDefogger ? t('remote.on') : t('remote.off')}</span></div>
        ${hvac.hvacProhibited ? '<div class="meta" style="margin-top:4px;color:var(--yellow)">' + t('remote.climate_unavailable') + '</div>' : ''}
      </div>`;
    }
  }

  h+=`<div class="meta" id="remoteStatus" style="margin-top:8px"></div>`;
  el.innerHTML=h;

  // Replace element to remove any previous click listeners
  const fresh = el.cloneNode(true);
  el.parentNode.replaceChild(fresh, el);
  fresh.addEventListener('click', function(e) {
    const btn = e.target.closest('[data-cmd]');
    if (btn) sendCommand(btn.dataset.cmd);
  });
}

async function sendCommand(cmd) {
  if(!currentVin)return;
  if(!confirm(t('remote.confirm')))return;
  const st=document.getElementById('remoteStatus');
  st.textContent='...';
  try{
    const r=await(await fetch(`/api/command/${currentVin}/${cmd}`,{method:'POST',headers:_postHeaders()})).json();
    if(r.error)st.textContent=t('app.error')+': '+r.error;
    else st.textContent=t('remote.sent');
  }catch(e){st.textContent=t('app.error')+': '+e.message}
}

  h+=`<div class="stat-box" style="padding:0"><div class="stat-num" style="font-size:20px">${r.max_speed?Math.round(r.max_speed):'?'}</div><div class="stat-label">max ${speedUnit()}</div></div>`;

  // Score
  h+=`<div><span class="trip-score ${scoreClass(sc)}" style="width:36px;height:36px;font-size:15px">${sc??'?'}</span></div>`;

  // Efficiency bar
  h+=`<div style="min-width:160px;flex:1">`;

  }

async function loadTripsPage() {
  const from=document.getElementById('tripsFrom').value,to=document.getElementById('tripsTo').value;
  document.getElementById('tripsMeta').textContent=t('app.loading');
  const count=await(await fetch('/api/db/count')).json();
  if(count.count===0){document.getElementById('tripsTable').innerHTML=`<div class="meta" style="padding:24px">${t('trips.no_db')}</div>`;document.getElementById('tripsMeta').textContent='';return}
  const trips=await(await fetch(`/api/db/trips?limit=200&from_date=${from}&to_date=${to}&vin=${currentVin}`)).json();
  document.getElementById('tripsMeta').textContent=`${trips.length} ${t('trips.title')}`;
  renderTripsTable(trips);
}

async function syncTrips() {
  if(!currentVin)return;const btn=document.getElementById('syncBtn');const meta=document.getElementById('tripsMeta');
  btn.disabled=true;btn.style.opacity='.6';btn.textContent=t('trips.syncing');
  try{const res=await(await fetch(`/api/sync/${currentVin}`,{method:'POST',headers:_postHeaders()})).json();
    if(res.error)meta.textContent=t('app.error')+': '+res.error;
    else{meta.textContent=t('trips.sync_result').replace('{new}',res.new).replace('{updated}',res.updated).replace('{total}',res.db_total);loadTripsPage()}
  }catch(e){meta.textContent=t('app.error')+': '+e.message}
  btn.disabled=false;btn.style.opacity='1';btn.textContent=t('trips.sync');
}

    h+=`<td class="num">${r.duration_s?Math.round(r.duration_s/60):'?'} <span class="meta">min</span></td>`;
    h+=`<td class="num">${r.avg_speed?Math.round(r.avg_speed):'?'} <span class="meta">/ ${r.max_speed?Math.round(r.max_speed):'?'}</span></td>`;
    h+=`<td class="num"><span class="trip-score ${scoreClass(sc)}">${sc??'?'}</span></td>`;
    h+=`<td style="min-width:140px">${sbarHtml(p)}<div class="trip-pct"><b>${p.eco}</b> eco &middot; <b>${p.reku}</b> reku &middot; <b>${p.power}</b> pwr</div>`;
    if(badB||badA)h+=`<div style="font-size:11px;color:var(--red);margin-top:1px">${badB?badB+' '+t('trips.braking_events'):''} ${badA?badA+' '+t('trips.accel_events'):''}</div>`;
    h+=`</td>`;

async function showTrip(tripId) {
  document.getElementById('tripOverlay').classList.add('open');
  const el=document.getElementById('tripDetail');el.innerHTML=`<div class="meta">${t('app.loading')}</div>`;
  const r=await(await fetch(`/api/db/trip/${tripId}`)).json();
  if(r.error){const errEl=document.createElement('div');errEl.className='error';errEl.textContent=r.error;el.appendChild(errEl);return}
  const p=hdc(r),beh=r.behaviours||[],route=r.route||[];
  let h=`<div class="section-title">${fmtDate(r.start_ts)}</div>`;
  h+=`<div class="grid3" style="margin-bottom:16px">`;
  h+=`<div class="stat-box"><div class="stat-num">${fmtKm(r.length_m)}</div><div class="stat-label">${distLabel()}</div></div>`;
  h+=`<div class="stat-box"><div class="stat-num">${r.duration_s?Math.round(r.duration_s/60):'?'}</div><div class="stat-label">min</div></div>`;
  h+=`<div class="stat-box"><div class="stat-num">${r.avg_speed?Math.round(r.avg_speed):'?'}</div><div class="stat-label">&#8709; ${speedUnit()}</div></div></div>`;

  h+=`<div class="grid2" style="margin-bottom:16px">`;
  h+=`<div class="card"><div class="section-title">${t('trips.scores')}</div>`;
  h+=`<div class="row"><span class="k">${tip(t('trips.score_overall'),'efficiency.score_desc')}</span><span>${r.score_global??'?'}</span></div>`;
  h+=`<div class="row"><span class="k">${t('trips.score_accel')}</span><span>${r.score_acceleration??'?'}</span></div>`;
  h+=`<div class="row"><span class="k">${t('trips.score_braking')}</span><span>${r.score_braking??'?'}</span></div>`;
  if(r.score_constant_speed!=null)h+=`<div class="row"><span class="k">${t('trips.score_consistency')}</span><span>${r.score_constant_speed}</span></div>`;
  h+=`</div>`;
  h+=`<div class="card"><div class="section-title">${t('trips.driving_modes')}</div>${sbarHtml(p)}`;
  h+=`<div class="sbar-legend"><span class="leg-eco">${t('efficiency.eco')} ${p.eco}%</span><span class="leg-reku">${t('efficiency.reku')} ${p.reku}%</span><span class="leg-power">${t('efficiency.power')} ${p.power}%</span></div>`;
  h+=`<div class="row" style="margin-top:8px"><span class="k">${tip(t('efficiency.eco'),'efficiency.eco_desc')}</span><span>${p.eco}% (${fmtKm(r.hdc_eco_dist)} ${distLabel()})</span></div>`;
  h+=`<div class="row"><span class="k">${tip(t('efficiency.reku'),'efficiency.reku_desc')}</span><span>${p.reku}% (${fmtKm(r.hdc_charge_dist)} ${distLabel()})</span></div>`;
  h+=`<div class="row"><span class="k">${tip(t('efficiency.power'),'efficiency.power_desc')}</span><span>${p.power}% (${fmtKm(r.hdc_power_dist)} ${distLabel()})</span></div>`;
  if(DEBUG&&r.est_kwh_100km)h+=`<div class="row" style="margin-top:8px;border-top:1px solid var(--border);padding-top:8px"><span class="k">${tip(t('efficiency.est_consumption'),'efficiency.est_consumption_desc')}</span><span style="font-weight:600">${r.est_kwh_100km} kWh/100km</span></div>`;
  h+=`</div></div>`;

  if(beh.length){
    const bad=beh.filter(b=>!b.good);
    h+=`<div class="card" style="margin-bottom:16px"><div class="section-title">${t('trips.behaviours')} (${beh.length})</div>`;
    if(bad.length)h+=`<div style="color:var(--red);font-size:13px;margin-bottom:8px">${bad.filter(b=>b.type==='B').length} ${t('trips.braking_events')}, ${bad.filter(b=>b.type==='A').length} ${t('trips.accel_events')}</div>`;
    h+=`<table><thead><tr><th>${t('trips.behaviour_time')}</th><th>${t('trips.behaviour_type')}</th><th>${t('trips.behaviour_rating')}</th></tr></thead><tbody>`;
    for(const b of beh){
      const time=b.ts?new Date(b.ts).toLocaleTimeString(LC):'?';
      h+=`<tr><td>${time}</td><td>${b.type==='B'?t('trips.braking'):t('trips.acceleration')}</td><td>${b.good?`<span style="color:var(--green)">${t('trips.good')}</span>`:`<span style="color:var(--red)">${t('trips.harsh')}</span>`}</td></tr>`;
    }
    h+=`</tbody></table></div>`;
  }

  // Route
  h+=`<div class="card"><div class="section-title">${t('trips.route')}</div>`;
  h+=`<div style="position:relative"><canvas id="routeCanvas" style="width:100%;height:420px;border-radius:6px;cursor:grab;display:block"></canvas><button class="btn btn-sm" onclick="if(window._routeMap)window._routeMap.fitRoute()" style="position:absolute;top:8px;right:8px;opacity:.85">${t('trips.route_fit')}</button></div>`;
  h+=`<div class="sbar-legend" style="margin-top:8px"><span class="leg-eco">${t('efficiency.eco')}</span><span class="leg-reku">${t('efficiency.reku')}</span><span class="leg-power">${t('efficiency.power')}</span><span style="color:var(--muted);font-size:11px;margin-left:auto">${t('trips.route_scroll')}</span></div></div>`;

  h+=`<details style="margin-top:16px"><summary class="meta" style="cursor:pointer">${t('trips.stats_nerds')}</summary>`;
  h+=`<pre id="tripJsonPre" style="background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:12px;font-size:11px;overflow:auto;max-height:400px;margin-top:8px;font-family:'SF Mono',Menlo,monospace"></pre></details>`;

  el.innerHTML=h;
  // Set JSON via textContent to prevent XSS
  const jsonPre=document.getElementById('tripJsonPre');
  if(jsonPre)jsonPre.textContent=JSON.stringify(r,null,2);
  const canvas=document.getElementById('routeCanvas');
  if(canvas)window._routeMap=new RouteMap(canvas,route,beh);
}
